<!-- Micro-interaction Script -->
<script>
        function switchTab(tabId) {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.classList.remove('bg-primary', 'text-on-primary');
                tab.classList.add('bg-surface-container-high', 'text-on-surface-variant');
            });

            const activeTab = document.getElementById('tab-' + tabId);
            activeTab.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
            activeTab.classList.add('bg-primary', 'text-on-primary');

            // Simulate content loading animation
            const container = document.getElementById('food-list-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                container.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        }

        // Add to buttons ripple effect simulation or scale
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
